version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    cooldown:
      default-days: 10
    schedule:
      interval: "weekly"
    groups:
      all:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    cooldown:
      default-days: 10
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"

  - package-ecosystem: "nix"
    cooldown:
      default-days: 10
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "build"
