name: CD

on:
  push:
    branches:
      - master

permissions:
  contents: read
  id-token: write

jobs:
  publish-to-npm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "ts/watchdawg"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c
        # TODO: get npm from nix develop
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - run: |
          # https://github.com/actions/setup-node/issues/1440
          echo 'NODE_AUTH_TOKEN=""' >> $GITHUB_ENV
      - run: |
          npm config set registry https://registry.npmjs.org
      - run: npm ci
      - run: |
          printf '//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}\n' > ~/.npmrc
      - run: npm run build
        # Publish a new version to npm by bumping the version number in
        # package.json manually.  npm will reject versions with existing
        # version numbers.
      - run: npm publish --access public --provenance
